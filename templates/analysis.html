<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis - AI-Powered Sentiment Analysis Dashboard</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/analysis">Analysis</a>
            <a href="/history">History</a>
            <a href="/api-docs">API Docs</a>
        </nav>
    </header>
    <main class="container mt-5">
        <h1 class="text-primary">Sentiment Analysis</h1>
        <form id="analysis-form">
            <div class="mb-3">
                <label for="text" class="form-label">Enter text for analysis:</label>
                <textarea class="form-control" id="text" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Analyze</button>
        </form>
        <div id="result" class="mt-3"></div>
    </main>
    <footer class="text-center mt-5">
        <p>&copy; 2023 AI-Powered Sentiment Analysis Dashboard</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
